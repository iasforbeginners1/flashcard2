<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancient History Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --parchment: #e8dcc8;
    --ink: #1a1208;
    --amber: #c8860a;
    --rust: #8b3a0f;
    --gold: #d4a017;
    --shadow: rgba(26,18,8,0.18);
  }

  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,134,10,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(139,58,15,0.06) 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--rust);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  header p {
    margin-top: 8px;
    font-size: 1.05rem;
    color: var(--amber);
    font-style: italic;
  }

  .progress {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--parchment);
    border: 2px solid var(--amber);
    transition: background 0.3s;
  }
  .dot.active { background: var(--amber); }

  .card-area {
    perspective: 1200px;
    width: min(520px, 100%);
    height: 320px;
    margin-bottom: 36px;
    cursor: pointer;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 16px;
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 8px var(--shadow);
  }

  .face-front {
    background: var(--parchment);
    border: 2px solid var(--gold);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,134,10,0.08) 28px);
  }

  .face-back {
    background: var(--ink);
    border: 2px solid var(--amber);
    transform: rotateY(180deg);
    color: var(--cream);
  }

  .face-front::before, .face-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 10px;
    border: 1px solid rgba(200,134,10,0.25);
    pointer-events: none;
  }

  .card-tag {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 14px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .face-front .card-tag {
    background: var(--amber);
    color: #fff;
  }

  .face-back .card-tag {
    background: var(--amber);
    color: var(--ink);
  }

  .face-front .question {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    line-height: 1.6;
    color: var(--ink);
    font-weight: 600;
  }

  .face-back .answer {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    line-height: 1.6;
    color: var(--cream);
  }

  .face-back .answer strong {
    color: var(--gold);
    font-size: 1.25em;
    display: block;
    margin-bottom: 8px;
    font-family: 'Playfair Display', serif;
  }

  .hint {
    margin-top: 18px;
    font-size: 0.82rem;
    opacity: 0.55;
    font-style: italic;
    letter-spacing: 0.02em;
  }

  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  button {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    border: 2px solid var(--amber);
    border-radius: 50px;
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-flip {
    background: var(--amber);
    color: #fff;
  }
  .btn-flip:hover { background: var(--rust); border-color: var(--rust); }

  .btn-nav {
    background: transparent;
    color: var(--rust);
  }
  .btn-nav:hover { background: var(--parchment); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  .counter {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--amber);
    min-width: 56px;
    text-align: center;
  }

  footer {
    margin-top: 48px;
    font-size: 0.8rem;
    color: var(--amber);
    opacity: 0.6;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <h1>प्राचीन इतिहास</h1>
  <p>Ancient History — Flashcards</p>
</header>

<div class="progress" id="progress"></div>

<div class="card-area" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front">
      <span class="card-tag">प्रश्न · Question</span>
      <p class="question" id="question-text"></p>
      <p class="hint">tap to reveal answer</p>
    </div>
    <div class="face face-back">
      <span class="card-tag">उत्तर · Answer</span>
      <p class="answer" id="answer-text"></p>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-nav" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
  <span class="counter" id="counter">1 / 5</span>
  <button class="btn-nav" id="next-btn" onclick="navigate(1)">Next →</button>
</div>
<div style="margin-top:14px;">
  <button class="btn-flip" onclick="flipCard()">Flip Card</button>
</div>

<footer>UPSC · Ancient India · 2024–2025</footer>

<script>
const cards = [
  {
    question: "प्राचीन व्यापार के सन्दर्भ में: क्या यह सत्य है कि (1) प्राचीन भारत में बहुत से नदी-बन्दरगाह थे, और (2) वहाँ सामान व यातायात के बड़े गोदाम थे?",
    answer: "<strong>✓ दोनों सही (1 और 2)</strong>प्राचीन भारत में नदी-बन्दरगाह और बड़े गोदाम दोनों के प्रमाण मिलते हैं।\n\nBoth statements are correct regarding ancient Indian trade.",
  },
  {
    question: "अशोक के सन्दर्भ में: क्या यह सत्य है कि (1) उनकी धम्म की परिभाषा 'राहुलोवादसुत' से ली गई है, और (2) 14वें वर्ष में उन्होंने धम्ममहामात्र की नियुक्ति की?",
    answer: "<strong>✓ दोनों सही (1 और 2)</strong>अशोक ने 'राहुलोवादसुत' से धम्म की परिभाषा ली और अपने 14वें राज्याभिषेक वर्ष में धम्ममहामात्र नामक अधिकारी नियुक्त किए।",
  },
  {
    question: "निम्नलिखित विदेशी यात्रियों को आरोही कालक्रम में व्यवस्थित कीजिए:\n1. इत्सिंग  2. अल-बरूनी  3. हेन त्साग  4. फाह्यान",
    answer: "<strong>✓ सही क्रम: 4, 3, 1, 2</strong>फाह्यान (399–414 CE) → हेन त्साग (629–645 CE) → इत्सिंग (671–695 CE) → अल-बरूनी (1017–1030 CE)",
  },
  {
    question: "सिन्धु घाटी सभ्यता से सम्बन्धित निम्नलिखित में से कौन से पुरातात्विक स्थल आज के उत्तर प्रदेश में स्थित हैं?\n1. मंडी  2. राखीगढ़ी  3. हुलास",
    answer: "<strong>✓ केवल 3 (हुलास)</strong>हुलास उत्तर प्रदेश में स्थित है। राखीगढ़ी हरियाणा में है। मंडी भी UP का स्थल है — सही उत्तर: 1 और 3 (विकल्प c)।",
  },
  {
    question: "चार बौद्ध संगीतियाँ क्रमशः निम्नलिखित स्थानों पर हुईं — इन्हें सही कालक्रम में व्यवस्थित करें:\n1. वैशाली  2. राजगृह  3. कुण्डलवन  4. पाटलिपुत्र",
    answer: "<strong>✓ सही क्रम: 2, 1, 4, 3</strong>राजगृह (1st, ~483 BCE) → वैशाली (2nd, ~383 BCE) → पाटलिपुत्र (3rd, ~250 BCE) → कुण्डलवन (4th, ~72 CE)",
  }
];

let current = 0;
let flipped = false;

function renderDots() {
  const p = document.getElementById('progress');
  p.innerHTML = cards.map((_, i) =>
    `<div class="dot ${i === current ? 'active' : ''}"></div>`
  ).join('');
}

function renderCard() {
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('question-text').textContent = cards[current].question;
  document.getElementById('answer-text').innerHTML = cards[current].answer.replace(/\n/g, '<br>');
  document.getElementById('counter').textContent = `${current + 1} / ${cards.length}`;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === cards.length - 1;
  renderDots();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  current = Math.max(0, Math.min(cards.length - 1, current + dir));
  renderCard();
}

renderCard();
</script>
</body>
</html>

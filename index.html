<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Speed Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8; --parchment: #e8dcc8; --ink: #1a1208;
    --amber: #c8860a; --rust: #8b3a0f; --gold: #d4a017;
  }
  body {
    background: var(--cream); font-family: 'Crimson Pro', serif;
    display: flex; flex-direction: column; align-items: center; padding: 20px;
  }
  .stats-bar {
    display: flex; gap: 20px; margin-bottom: 20px; font-weight: bold; color: var(--rust);
  }
  #timer { font-size: 1.5rem; color: #d9534f; border: 2px solid #d9534f; padding: 5px 15px; border-radius: 10px; }
  .card-area { perspective: 1200px; width: min(500px, 100%); height: 300px; cursor: pointer; margin-bottom: 20px; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; border-radius: 16px; }
  .card.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border-radius: 16px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
  .face-front { background: var(--parchment); border: 2px solid var(--gold); }
  .face-back { background: var(--ink); border: 2px solid var(--amber); transform: rotateY(180deg); color: var(--cream); }
  button { font-family: 'Playfair Display', serif; padding: 10px 25px; cursor: pointer; border-radius: 50px; border: none; background: var(--amber); color: white; font-size: 1rem; }
  button:disabled { background: #ccc; }
</style>
</head>
<body>

<h1 style="color: var(--rust); font-family: 'Playfair Display';">प्राचीन इतिहास - Speed Test</h1>

<div class="stats-bar">
  <div>Score: <span id="score">0</span></div>
  <div id="timer">Time: 15s</div>
</div>

<div class="card-area" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front">
      <p id="question-text" style="font-size: 1.1rem; font-weight: 600;"></p>
      <p style="font-size: 0.8rem; margin-top: 15px; opacity: 0.6;">Tap to reveal answer</p>
    </div>
    <div class="face face-back">
      <p id="answer-text" style="font-size: 1rem;"></p>
    </div>
  </div>
</div>

<div class="controls">
  <button id="next-btn" onclick="nextQuestion()">Next Question</button>
  <button onclick="location.reload()" style="background: var(--rust);">Reset Game</button>
</div>

<script>
const cards = [
  { q: "अशोक की धम्म की परिभाषा कहाँ से ली गई है?", a: "राहुलोवादसुत (Rahulovadasutta)" },
  { q: "फाह्यान किसके शासनकाल में भारत आया था?", a: "चंद्रगुप्त द्वितीय (Chandragupta II)" },
  { q: "सिन्धु घाटी सभ्यता का 'हुलास' स्थल कहाँ है?", a: "उत्तर प्रदेश (UP)" },
  { q: "प्रथम बौद्ध संगीति कहाँ हुई थी?", a: "राजगृह (Rajgriha)" }
];

let current = 0;
let score = 0;
let timeLeft = 15;
let timer;

function startTimer() {
  clearInterval(timer);
  timeLeft = 15;
  document.getElementById('timer').textContent = `Time: ${timeLeft}s`;
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').textContent = `Time: ${timeLeft}s`;
    if(timeLeft <= 0) {
      clearInterval(timer);
      alert("Time's up! Next question.");
      nextQuestion();
    }
  }, 1000);
}

function renderCard() {
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('question-text').textContent = cards[current].q;
  document.getElementById('answer-text').innerHTML = cards[current].a;
  startTimer();
}

function flipCard() {
  document.getElementById('card').classList.toggle('flipped');
  if(current === cards.length - 1) {
      document.getElementById('next-btn').textContent = "Finish Quiz";
  }
}

function nextQuestion() {
  if(current < cards.length - 1) {
    current++;
    score += 10;
    document.getElementById('score').textContent = score;
    renderCard();
  } else {
    clearInterval(timer);
    alert(`Quiz Complete! Final Score: ${score + 10}`);
  }
}

renderCard();
</script>
</body>
</html>
